# Agent 模型 Provider 注册表（禁止写入明文密钥；密钥经环境变量注入）
# 默认模型（provider 名）
default_model = local-qwen

# 已注册 provider 列表（逗号分隔）
providers = local-qwen, deepseek-chat

# 本地 Ollama（OpenAI 兼容端点，无需密钥）
local-qwen.base_url = http://127.0.0.1:11434/v1
local-qwen.model = qwen2.5:7b
local-qwen.api_key_env =

# DeepSeek 云（密钥从环境变量 DEEPSEEK_API_KEY 读取）
deepseek-chat.base_url = https://api.deepseek.com/v1
deepseek-chat.model = deepseek-chat
deepseek-chat.api_key_env = DEEPSEEK_API_KEY
