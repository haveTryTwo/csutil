package demo_multi;

// Base response fields for all RPC responses
message BaseResp {
    optional int32 ret_code = 1;
    optional string ret_msg = 2;
}

// ACL Service
message AclReq {
    optional string user_name = 1;
    optional string resource = 2;
}

message AclResp {
    optional BaseResp base = 1;
    optional bool is_allow = 2;
    optional string detail = 3;
}

// Study Service
message StudyReq {
    optional string student_name = 1;
    optional string subject = 2;
}

message StudyResp {
    optional BaseResp base = 1;
    optional int32 num_subject = 2;
    optional string detail = 3;
}

// Control Service
message ControlReq {
    optional string command = 1;
    optional string target = 2;
}

message ControlResp {
    optional BaseResp base = 1;
    optional string acl_result = 2;
    optional string study_result = 3;
}

// Client generic request/response
message ClientReq {
    optional string message = 1;
    optional int32 index = 2;
}

message ClientResp {
    optional BaseResp base = 1;
    optional string message = 2;
}
