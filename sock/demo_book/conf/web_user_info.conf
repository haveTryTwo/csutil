# book web gateway: upstream Control endpoint + static page path
control_server_ip   = 127.0.0.1
control_server_port = 9101
static_index_path   = ./web/index.html

# Agent（问答）配置：provider 注册表 + 领域技能目录 + 会话持久化库 + 知识库根目录
agent_conf_path     = ./conf/agent.conf
agent_skills_dir    = ./agent/skills
agent_db_path       = ./data/agent_db
# 长期记忆库（独立 LevelDB，与会话库分目录，避免同目录重复 Open）
agent_mem_db_path   = ./data/agent_mem_db
# 记忆机制总开关（1 开 / 0 关）：关闭则不注入长期记忆、不做记忆抽取与滚动摘要
agent_memory_enable = 1
# 工具调用（agentic loop）总开关（1 开 / 0 关）与最大迭代次数（§16.6）
# 工具文件访问（search_code/read_file）严格限定在 agent_knowledge_root（csutil 根）之内
agent_tools_enable  = 1
agent_tool_max_iters = 4
# knowledge_globs（如 mystl/*.h）相对该根目录解析；网关运行于 sock/demo_book，故仓库根为 ../..
agent_knowledge_root = ../..
